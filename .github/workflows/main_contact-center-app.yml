name: Build and deploy Node.js app to Azure Web App - contact-center-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build --if-present

      - name: Keep only production dependencies
        run: npm prune --omit=dev

      - name: Create deployment package
        run: |
          rm -rf release release.zip
          mkdir -p release
          cp package.json package-lock.json server.ts knexfile.ts release/
          cp -r dist src node_modules release/
          [ -f tsconfig.json ] && cp tsconfig.json release/
          cd release
          zip -rq ../release.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_75E7311A0A234F78920C8F58457BD0E1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E818FF295088428588714610EB52173C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3CAB9C9898834E3E8B16390FFB73AC89 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'contact-center-app'
          slot-name: 'Production'
          package: release.zip
